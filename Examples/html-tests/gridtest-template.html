<!DOCTYPE html>
<html>

    <head>

        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <style>
            /* Reset everything to zero */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            @page {
                size: 210mm 297mm;
                margin: 0;
            }

            .page {
                width: 210mm;
                height: 297mm;
                position: relative;
                overflow: hidden;
                background: white;
                /* No border, no shadow, no padding */
            }

            .subpage {
                width: 100%;
                height: 100%;
                /* This is our 'payload' box */
            }

            /* The Grid: 1px red line every 10mm */
            .grid-line {
                position: absolute;
                left: 0;
                width: 100%;
                height: 1px;
                background: red;
            }

            /* The Page Marker: A blue 2px line exactly at Top 0 */
            .top-marker {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 2px;
                background: blue;
            }


        </style>

        <head>
<body>
<div class="page">
    <div class="subpage">
<div class="top-marker"></div>
<div class="grid-line" style="top: 10mm">10mm</div>
<div class="grid-line" style="top: 20mm">20mm</div>
<div class="grid-line" style="top: 10mm"></div>
<div class="grid-line" style="top: 10mm"></div>
    <div class="page-number">Page 100</div>
    </div>
</div>

</body>



</html>
